<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Alfred Monitor: personal assistant + heartbeat (status). -->
  <defs>
    <linearGradient id="alfred-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0b0720"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#alfred-bg)"/>
  <!-- Bowtie (butler motif) -->
  <path d="M10 13 L16 16 L10 19 Z" fill="#6366f1"/>
  <path d="M22 13 L16 16 L22 19 Z" fill="#6366f1"/>
  <circle cx="16" cy="16" r="1.4" fill="#312e81"/>
  <!-- Heartbeat / monitor trace below the bowtie -->
  <path d="M5 24 L10 24 L12 20 L14 28 L17 22 L20 24 L27 24"
        fill="none" stroke="#22c55e" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Status dot -->
  <circle cx="26" cy="7" r="2" fill="#22c55e"/>
  <circle cx="26" cy="7" r="3.4" fill="none" stroke="#22c55e" stroke-width="0.7" opacity="0.5"/>
</svg>
